<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<link rel="manifest" href="%sveltekit.assets%/manifest.json" />
	<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#0f172a" />
	<meta name="color-scheme" content="light dark" />

	<!-- Fonts — preload critical weight to avoid render-blocking -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link
		rel="preload"
		as="style"
		href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Outfit:wght@400;700;800;900&family=Noto+Sans:wght@400;700&display=swap&subset=cyrillic"
		onload="this.rel='stylesheet'"
	/>
	<noscript>
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Outfit:wght@400;700;800;900&family=Noto+Sans:wght@400;700&display=swap&subset=cyrillic"
			rel="stylesheet"
		/>
	</noscript>

	<!-- Default SEO meta — individual routes override these in <svelte:head> -->
	<meta name="description"
		content="Discover Kazakhstan's best attractions, rich history, and vibrant culture with VeryNice — your comprehensive travel guide." />
	<meta name="author" content="VeryNice" />
	<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
	<!-- Canonical is set per-route in <svelte:head> — no global canonical here -->

	<!-- Open Graph defaults — routes override with page-specific values -->
	<meta property="og:type" content="website" />
	<meta property="og:site_name" content="VeryNice.kz" />
	<meta property="og:title" content="VeryNice — Kazakhstan Travel Guide" />
	<meta property="og:description"
		content="Discover Kazakhstan's best attractions, rich history, and vibrant culture." />
	<!-- 1200×630 social share image (proper OG dimensions) -->
	<meta property="og:image" content="https://verynice.kz/assets/og-cover.jpg" />
	<meta property="og:image:width" content="1200" />
	<meta property="og:image:height" content="630" />
	<meta property="og:locale" content="en_US" />

	<!-- Twitter Card defaults -->
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="VeryNice — Kazakhstan Travel Guide" />
	<meta name="twitter:description"
		content="Discover Kazakhstan's best attractions, rich history, and vibrant culture." />
	<meta name="twitter:image" content="https://verynice.kz/assets/og-cover.jpg" />
	<meta name="twitter:creator" content="@verynicekz" />

	<!-- PWA -->
	<meta name="mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
	<meta name="apple-mobile-web-app-title" content="VeryNice" />

	%sveltekit.head%

	<style>
		/* Critical CSS for instant paint */
		body { margin: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
	</style>
</head>

<body data-sveltekit-preload-data="hover">
	<a href="#main-content" class="skip-to-content">Skip to main content</a>
	<div style="display: contents">%sveltekit.body%</div>
	<script>
		// Service Worker — register after page load (no arbitrary delay)
		if ('serviceWorker' in navigator) {
			window.addEventListener('load', () => {
				const swUrl = '/service-worker.js?v=' + Date.now();
				navigator.serviceWorker.register(swUrl, {
					scope: '/',
					updateViaCache: 'none',
					type: 'module'
				}).then(reg => {
					// Check for updates every hour
					setInterval(() => reg.update(), 3600000);
				}).catch(() => {
					// SW registration failure is non-critical
				});
			});
		}
	</script>
</body>

</html>
