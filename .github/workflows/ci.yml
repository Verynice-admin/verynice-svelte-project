name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Svelte check
        run: npm run check

      - name: Unit & server tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high
